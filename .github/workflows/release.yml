name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build AppImage in container
        run: ./linux/appimage/build-in-docker.sh

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v2
        with:
          files: PoxChat-x86_64.AppImage
